[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "np-discovery"
version = "0.1.0"
description = "CPU-only biosynthetic novelty atlas: map BGC space and rank unexplored regions (MIBiG)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Eric Snow" }]
dependencies = [
  "numpy>=1.24",
  "pandas>=2.0",
  "scikit-learn>=1.3",
  "umap-learn>=0.5.5",
  "matplotlib>=3.7",
  "seaborn>=0.13",
  "biopython>=1.81",
  "requests>=2.31",
  "tqdm>=4.66",
  "pyarrow>=14.0",
  "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.4"]

[project.scripts]
np-download = "npdiscovery.cli:download_main"
np-featurize = "npdiscovery.cli:featurize_main"
np-sanity = "npdiscovery.cli:sanity_main"
np-atlas = "npdiscovery.cli:atlas_main"
np-novelty = "npdiscovery.cli:novelty_main"
np-validate = "npdiscovery.cli:validate_main"
np-apply = "npdiscovery.cli:apply_main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
